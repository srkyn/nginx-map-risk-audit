worker_processes  1;

error_log  logs/error.log notice;

events {
    worker_connections  1024;
}

http {
    access_log off;

    map $http_user_agent $client_family {
        ~^(?<family>[A-Za-z]+)/  $family;
        default                 unknown;
    }

    server {
        listen 8088;
        server_name localhost;

        location / {
            proxy_set_header X-Client-Family "$family $client_family";
            return 200 "local validation only\n";
        }
    }
}
