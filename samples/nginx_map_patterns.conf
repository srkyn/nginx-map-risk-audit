# Safe schematic examples for defensive review. Not production config.

# Candidate pattern: regex map with a capture, then a later expression combines
# the capture and the map output.
map $http_user_agent $client_family {
    ~^(?<family>[A-Za-z]+)/  $family;
    default                 unknown;
}

proxy_set_header X-Client-Family "$family $client_family";

# Lower-risk pattern: simple map without regex captures.
map $http_upgrade $connection_mode {
    default upgrade;
    ''      close;
}

proxy_set_header Connection $connection_mode;
